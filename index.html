<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Prism</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;700&display=swap" rel="stylesheet">
    <link id="theme-stylesheet" rel="stylesheet" href="styles/styles.css">
    <style>
        /* Previous styles remain unchanged */
        body {
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
        }

        .page-container {
            --container-reference-height: 312px;
            display: flex;
            align-items: flex-start;
            width: 100%;
            max-width: 1200px;
            margin: 50px auto;
        }

        .side-container {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 0;
            padding: 20px;
            margin-bottom: 20px;
        }

        .left-sidebar {
            width: 150px;
            margin-right: 20px;
        }

        .right-sidebar {
            width: 200px;
            margin-left: 20px;
        }

        #current-date-container {
            height: 150px;
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 0;
            overflow: hidden;
            position: relative;
        }

        #current-date-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            filter: blur(3px);
            transform: scale(1.1);
        }

        #current-date-container h3,
        #current-date-container #current-date {
            position: relative;
            z-index: 1;
            color: white;
            margin: 5px 0;
            text-align: center;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #current-date-container h3 {
            font-size: 24px;
        }

        #current-date-container #current-date {
            font-size: 22px;
        }

        #recorded-dates-container {
            box-sizing: border-box;
            height: var(--container-reference-height);
            overflow-y: auto;
        }

        .main-column {
            width: 800px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .main-container {
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: var(--container-reference-height);
            padding: 20px;
            background-color: #ffffff;
            border-radius: 0;
            overflow: hidden;
        }

        #editor {
            box-sizing: border-box;
            flex: 1;
            min-height: 0;
            height: auto;
            background-color: #f5f5f5;
            border: none;
            border-radius: 0;
            margin-top: 20px;
            padding: 15px;
            font-size: 18px;
        }

        .ql-toolbar {
            border-radius: 0;
        }

        .ql-snow .ql-picker-label,
        .ql-snow .ql-picker-options {
            border-radius: 0;
        }

        .button {
            border: 1px solid #dddddd;
            border-radius: 0;
            padding: 0;
            width: 32px;
            height: 32px;
            font-size: 16px;
            font-weight: 500;
            background-color: #ffffff;
            color: #000000;
            cursor: pointer;
            box-shadow: none;
            margin: 0;
            transition: background-color 0.3s, border-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .button:hover {
            background-color: #f2f2f2;
            border-color: #000000;
        }

        .button [data-lucide],
        #sort-toggle [data-lucide] {
            display: block;
            width: 18px;
            height: 18px;
            stroke-width: 2.2;
            pointer-events: none;
        }

        #sort-toggle [data-lucide] {
            width: 22px;
            height: 22px;
        }

        #action-buttons-container {
            padding: 12px;
        }

        #output {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.6;
            font-size: 18px;
            color: #333;
            max-width: 100%;
        }

        #output pre,
        #output pre.ql-syntax {
            background-color: #23241f;
            color: #f8f8f2;
            display: block;
            font-family: Consolas, Monaco, 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.45;
            margin: 14px 0;
            overflow-x: auto;
            padding: 12px 14px;
            tab-size: 4;
            white-space: pre;
        }

        #output code {
            background-color: #f1f1f1;
            font-family: Consolas, Monaco, 'Courier New', monospace;
            font-size: 0.92em;
            padding: 2px 4px;
        }

        #output pre code,
        #output pre.ql-syntax code {
            background: transparent;
            color: inherit;
            font-size: inherit;
            padding: 0;
        }

        #output-container {
            display: none;
            padding: 20px;
            background-color: #ffffff;
            border-top: 1px solid #dddddd;
        }

        #output-container.has-output {
            display: block;
        }

        #history {
            margin-top: 20px;
        }

        .history-item {
            margin-bottom: 10px;
            cursor: pointer;
        }

        .history-item:hover {
            text-decoration: underline;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .ql-editor::-webkit-scrollbar,
        #recorded-dates-container::-webkit-scrollbar {
            width: 6px;
        }

        .ql-editor::-webkit-scrollbar-track,
        #recorded-dates-container::-webkit-scrollbar-track {
            background: #f5f5f5;
        }

        .ql-editor::-webkit-scrollbar-thumb,
        #recorded-dates-container::-webkit-scrollbar-thumb {
            background-color: #8f8f8f;
            border-radius: 6px;
            border: 1px solid #f5f5f5;
        }

        .ql-editor::-webkit-scrollbar-thumb:hover,
        #recorded-dates-container::-webkit-scrollbar-thumb:hover {
            background-color: #6f6f6f;
        }

        .ql-editor::-webkit-scrollbar-button,
        #recorded-dates-container::-webkit-scrollbar-button {
            display: none;
            width: 0;
            height: 0;
        }

        #media-upload {
            display: none;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(3, 32px);
            justify-content: center;
            gap: 6px;
            margin: 0;
        }

        button,
        input,
        .side-container,
        .main-column,
        .main-container,
        #editor,
        #output-container,
        #duplicate-warning,
        .ql-toolbar,
        .ql-container,
        .ql-snow .ql-picker-label,
        .ql-snow .ql-picker-options {
            border-radius: 0 !important;
        }

        header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0.75rem 2rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: none;
            position: sticky;
            top: 0;
            z-index: 100;
            min-height: 48px;
            width: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
        }

        .logo-text {
            font-family: 'Alegreya', Georgia, serif;
            font-weight: 400;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #333;
            margin: 0;
        }

        @media screen and (max-width: 768px) {
            header {
                padding: max(0.75rem, env(safe-area-inset-top)) 1rem 0.75rem;
            }

            .page-container {
                flex-direction: column;
                margin: 10px;
                padding: 0 15px;
            }

            .left-sidebar,
            .right-sidebar,
            .main-column {
                width: calc(100% - 30px);
                margin: 10px 0;
                max-width: none;
            }

            .main-container {
                margin: 0;
                max-width: none;
                display: block;
                height: auto;
            }

            /* Reorder sidebar and main content */
            .left-sidebar {
                order: 2;
            }

            .main-column {
                order: 1;
            }

            .right-sidebar {
                order: 3;
            }

            /* Date container styling */
            #current-date-container {
                padding: 20px 15px;
                margin-bottom: 15px;
                height: auto;
            }

            #current-date {
                font-size: 24px;
                margin: 5px 0;
            }

            #current-time {
                font-size: 20px;
            }

            /* Editor area */
            #editor {
                height: 200px;
                min-height: 200px;
                margin-top: 15px;
                font-size: 16px;
            }

            /* Button group styling */
            .button-group {
                display: grid;
                grid-template-columns: repeat(5, 32px);
                gap: 8px;
                margin: 0;
            }

            .button {
                width: 32px;
                height: 32px;
                margin: 0;
                font-size: 16px;
            }

            /* Recorded dates container */
            #recorded-dates-container {
                height: auto;
                max-height: 200px;
                margin-top: 15px;
            }

            .history-item {
                padding: 10px;
                border-bottom: 1px solid #eee;
                font-size: 14px;
            }

            /* Quill editor toolbar */
            .ql-toolbar {
                display: flex;
                flex-wrap: wrap;
                padding: 8px;
            }

            .ql-toolbar button {
                margin: 2px;
            }

            /* Output area */
            #output {
                font-size: 16px;
            }

            /* Media elements */
            img,
            video,
            audio {
                max-width: 100%;
                height: auto;
                margin: 10px 0;
            }
        }
    </style>
</head>

<body>
    <header role="banner">
        <div class="logo">
            <span class="logo-text">Memory Prism</span>
        </div>
    </header>

    <div class="page-container">
        <div class="left-sidebar">
            <div class="side-container" id="current-date-container">
                <h3>Date</h3>
                <div id="current-date"></div>
                <div id="current-time"
                    style="position: relative; z-index: 1; color: white; font-size: 20px; margin-top: 5px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);">
                </div>
            </div>
            <div class="side-container" id="action-buttons-container">
                <div class="button-group" aria-label="Memory actions">
                    <button class="button" onclick="submitEntry()" title="Submit" aria-label="Submit"><i data-lucide="circle-check" aria-hidden="true"></i></button>
                    <button class="button" onclick="saveFile()" title="Save file" aria-label="Save file"><i data-lucide="save" aria-hidden="true"></i></button>
                    <input type="file" id="fileInput" style="display: none;" onchange="loadFile()">
                    <button class="button" onclick="document.getElementById('fileInput').click()" title="Load file" aria-label="Load file"><i data-lucide="folder-open" aria-hidden="true"></i></button>
                    <input type="file" id="media-upload" accept="image/*,video/*,audio/*" multiple>
                    <button class="button" onclick="document.getElementById('media-upload').click()" title="Add media" aria-label="Add media"><i data-lucide="image-plus" aria-hidden="true"></i></button>
                    <button class="button" onclick="downloadMedia()" title="Download media" aria-label="Download media"><i data-lucide="download" aria-hidden="true"></i></button>
                </div>
            </div>
        </div>
        <div class="main-column">
            <div class="main-container">
                <div id="editor"></div>
            <div id="duplicate-warning">⚠️ This entry is a duplicate and will not be saved.</div>
            </div>
            <div id="output-container">
                <div id="output"></div>
            </div>
        </div>
        <div class="right-sidebar">
            <div style="position: relative;">
                <div class="side-container" id="recorded-dates-container">
                    <h3>Recorded Dates</h3>
                    <div id="history"></div>
                </div>
                <button id="sort-toggle" onclick="toggleSort()" title="Sort oldest first" aria-label="Sort oldest first"><i data-lucide="arrow-up-narrow-wide" aria-hidden="true"></i></button>
            </div>
        </div>
    </div>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        function renderIcons() {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        function setSortIcon() {
            const button = document.getElementById('sort-toggle');
            button.innerHTML = `<i data-lucide="${sortNewestFirst ? 'arrow-up-narrow-wide' : 'arrow-down-wide-narrow'}" aria-hidden="true"></i>`;
            button.title = sortNewestFirst ? 'Sort oldest first' : 'Sort newest first';
            button.setAttribute('aria-label', button.title);
            renderIcons();
        }

        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['image', 'video'],
                    ['code-block'],
                    ['clean']
                ]
            }
        });

        let entries = [];

        function formatDate(date, isForContainer = false) {
            const d = new Date(date);
            if (isForContainer) {
                const formattedDate = d.toLocaleDateString('en-US', {
                    month: 'long',
                    day: '2-digit',
                    year: 'numeric'
                });
                const formattedTime = d.toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });
                return { date: formattedDate, time: formattedTime };
            }
            return d.toLocaleString(undefined, {
                year: 'numeric',
                month: 'numeric',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }

        function renderOutput(text) {
            const output = document.getElementById('output');
            const outputContainer = document.getElementById('output-container');
            output.innerHTML = text;
            outputContainer.classList.toggle('has-output', text.trim() !== '');
        }

        function submitEntry() {
            var text = quill.root.innerHTML;
            var date = new Date();
            var warning = document.getElementById('duplicate-warning');

            if (!isDuplicate(text)) {
                entries.unshift({ date: date.toISOString(), text });
                renderOutput(text);
                updateHistory();
                quill.setContents([]);
                updateCurrentDate(date);
                document.querySelector('#current-date-container h3').classList.add('has-entry');
                warning.classList.remove('show');
            } else {
                warning.classList.add('show');
                setTimeout(() => {
                    warning.classList.remove('show');
                }, 3000);
            }
        }

        function isDuplicate(text) {
            return entries.some(entry => entry.text === text);
        }

        function loadEntry(index) {
            var entry = entries[index];
            quill.root.innerHTML = entry.text;
            renderOutput(entry.text);
            updateCurrentDate(new Date(entry.date));
        }

        function updateCurrentDate(date) {
            const formatted = formatDate(date, true);
            document.getElementById('current-date').innerHTML = formatted.date;
            document.getElementById('current-time').innerHTML = formatted.time;
        }

        function saveFile() {
            var data = JSON.stringify(entries);
            var blob = new Blob([data], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'memory.save';
            a.click();
        }

        function loadFile() {
            var file = document.getElementById('fileInput').files[0];
            var reader = new FileReader();
            reader.onload = function (e) {
                entries = JSON.parse(e.target.result);
                updateHistory();
                if (entries.length > 0) {
                    loadEntry(entries.length - 1);
                    document.querySelector('#current-date-container h3').classList.add('has-entry');
                }
            };
            reader.readAsText(file);
        }

        document.getElementById('media-upload').addEventListener('change', function (e) {
            const files = e.target.files;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();

                reader.onload = function (event) {
                    const range = quill.getSelection(true);
                    if (file.type.startsWith('image/')) {
                        quill.insertEmbed(range.index, 'image', event.target.result);
                    } else if (file.type.startsWith('video/')) {
                        const video = `<video controls><source src="${event.target.result}" type="${file.type}"></video>`;
                        quill.clipboard.dangerouslyPasteHTML(range.index, video);
                    } else if (file.type.startsWith('audio/')) {
                        const audio = `<audio controls><source src="${event.target.result}" type="${file.type}"></audio>`;
                        quill.clipboard.dangerouslyPasteHTML(range.index, audio);
                    }
                    quill.setSelection(range.index + 1);
                };

                if (file.type.startsWith('image/') || file.type.startsWith('video/') || file.type.startsWith('audio/')) {
                    reader.readAsDataURL(file);
                } else {
                    console.error('Unsupported file type:', file.type);
                }
            }
        });

        function downloadMedia() {
            const output = document.getElementById('output');
            const images = output.getElementsByTagName('img');
            const videos = output.getElementsByTagName('video');
            const audios = output.getElementsByTagName('audio');

            function downloadFile(url, filename) {
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            Array.from(images).forEach((img, index) => {
                downloadFile(img.src, `image_${index + 1}.png`);
            });

            Array.from(videos).forEach((video, index) => {
                const source = video.querySelector('source');
                if (source) {
                    downloadFile(source.src, `video_${index + 1}.mp4`);
                }
            });

            Array.from(audios).forEach((audio, index) => {
                const source = audio.querySelector('source');
                if (source) {
                    downloadFile(source.src, `audio_${index + 1}.mp3`);
                }
            });
        }

        let sortNewestFirst = true;

        function toggleSort() {
            sortNewestFirst = !sortNewestFirst;
            setSortIcon();
            updateHistory();
        }

        function updateHistory() {
            let displayEntries = sortNewestFirst ? entries : entries.slice().reverse();
            var historyHtml = displayEntries.map((entry, index) => {
                let actualIndex = sortNewestFirst ? index : entries.length - 1 - index;
                return `<div class="history-item" onclick="loadEntry(${actualIndex})">${formatDate(entry.date)}</div>`;
            }).join('');
            document.getElementById('history').innerHTML = historyHtml;
        }

        renderIcons();
    </script>
</body>

</html>
